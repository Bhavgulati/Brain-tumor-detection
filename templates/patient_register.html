<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Patient Register — NeuroScan AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<style>
  body { background:#0a0a0a; color:#f0f0f0; font-family:'Segoe UI',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .auth-card { background:#111; border:1px solid #2a2a2a; border-radius:16px; padding:2.5rem; width:100%; max-width:420px; }
  .form-control-dark { background:#0a0a0a; border:1px solid #2a2a2a; color:#f0f0f0; border-radius:8px; padding:10px 14px; width:100%; font-size:14px; margin-bottom:16px; }
  .form-control-dark:focus { outline:none; border-color:#ea580c; }
  .form-control-dark::placeholder { color:#444; }
  .btn-orange { background:#ea580c; border:none; color:white; padding:12px; border-radius:8px; font-weight:600; font-size:15px; width:100%; cursor:pointer; transition:background 0.2s; }
  .btn-orange:hover { background:#c2410c; }
  .error-box { background:#450a0a; border:1px solid #7f1d1d; color:#fca5a5; border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:16px; }
  label { font-size:13px; color:#888; display:block; margin-bottom:6px; }
</style>
</head>
<body>
<div class="auth-card">
  <div class="text-center mb-4">
    <div style="width:48px;height:48px;background:#ea580c;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;color:white;margin:0 auto 12px;">N</div>
    <h2 style="font-size:1.4rem;font-weight:700;color:white;margin-bottom:4px;">Create Account</h2>
    <p style="color:#888;font-size:13px;">Register to track your scan history</p>
  </div>

  {% if error %}
  <div class="error-box">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/patient/register">
    <div class="row g-2 mb-0">
      <div class="col-8">
        <label>Full Name</label>
        <input type="text" name="name" class="form-control-dark" placeholder="John Doe" required/>
      </div>
      <div class="col-4">
        <label>Age</label>
        <input type="number" name="age" class="form-control-dark" placeholder="35" min="1" max="120"/>
      </div>
    </div>
    <div>
      <label>Email Address</label>
      <input type="email" name="email" class="form-control-dark" placeholder="you@example.com" required/>
    </div>
    <div>
      <label>Password</label>
      <input type="password" name="password" class="form-control-dark" placeholder="Choose a password" required minlength="6"/>
    </div>
    <button type="submit" class="btn-orange">Create Account</button>
  </form>

  <div style="text-align:center;margin-top:20px;">
    <p style="color:#555;font-size:13px;">Already have an account?
      <a href="/patient/login" style="color:#f97316;text-decoration:none;">Sign in</a>
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
