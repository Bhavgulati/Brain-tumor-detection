<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Doctor Login — NeuroScan AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<style>
  body { background:#0a0a0a; color:#f0f0f0; font-family:'Segoe UI',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .auth-card { background:#111; border:1px solid #2a2a2a; border-radius:16px; padding:2.5rem; width:100%; max-width:420px; }
  .form-control-dark { background:#0a0a0a; border:1px solid #2a2a2a; color:#f0f0f0; border-radius:8px; padding:10px 14px; width:100%; font-size:14px; margin-bottom:16px; }
  .form-control-dark:focus { outline:none; border-color:#ea580c; }
  .form-control-dark::placeholder { color:#444; }
  .btn-orange { background:#ea580c; border:none; color:white; padding:12px; border-radius:8px; font-weight:600; font-size:15px; width:100%; cursor:pointer; transition:background 0.2s; }
  .btn-orange:hover { background:#c2410c; }
  .error-box { background:#450a0a; border:1px solid #7f1d1d; color:#fca5a5; border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:16px; }
  label { font-size:13px; color:#888; display:block; margin-bottom:6px; }
  .doctor-badge { background:#1a1a2e; border:1px solid #2a2a4a; color:#a5b4fc; border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
</style>
</head>
<body>
<div class="auth-card">
  <div class="text-center mb-4">
    <div style="width:48px;height:48px;background:#1d4ed8;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color:white;margin:0 auto 12px;">
      <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
    </div>
    <h2 style="font-size:1.4rem;font-weight:700;color:white;margin-bottom:4px;">Doctor Access</h2>
    <p style="color:#888;font-size:13px;">Restricted to authorised medical staff</p>
  </div>

  <div class="doctor-badge">
    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    Default credentials: <strong>doctor</strong> / <strong>doctor@123</strong>
  </div>

  {% if error %}
  <div class="error-box">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/doctor/login">
    <div>
      <label>Username</label>
      <input type="text" name="username" class="form-control-dark" placeholder="doctor" required/>
    </div>
    <div>
      <label>Password</label>
      <input type="password" name="password" class="form-control-dark" placeholder="••••••••" required/>
    </div>
    <button type="submit" class="btn-orange">Sign In as Doctor</button>
  </form>

  <div style="text-align:center;margin-top:20px;">
    <p style="color:#555;font-size:13px;">
      <a href="/patient/login" style="color:#f97316;text-decoration:none;">← Patient login</a>
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
